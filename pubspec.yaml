name: random_reminder_app
description: "Ứng dụng nhắc việc ngẫu nhiên - thúc đẩy bạn hoàn thành công việc bằng thông báo bất ngờ."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management đơn giản, nhẹ
  provider: ^6.1.2

  # Lưu trữ offline (NoSQL, nhanh, không cần native SQL)
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Thông báo local (kèm action button)
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4

  # Chạy tác vụ nền để tái lập lịch mỗi ngày, kể cả khi app bị đóng
  workmanager: ^0.5.2

  # Xin quyền (exact alarm, notification, DND)
  permission_handler: ^11.3.1

  # id ngẫu nhiên, tiện ích
  uuid: ^4.4.0

  # Sao lưu / khôi phục dữ liệu ra file JSON
  path_provider: ^2.1.3
  file_picker: ^8.0.6

  # Icon Material 3 mở rộng
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.11
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
