## 8. Các tính năng đã hoàn thành theo yêu cầu

- [x] Thêm/sửa/xoá công việc, đánh dấu hoàn thành, thanh % hoàn thành kéo được.
- [x] Mỗi việc có: tiêu đề, ghi chú, mức ưu tiên, danh mục, bật/tắt thông báo, đánh dấu Quan trọng.
- [x] Random trong ngày / tuần / tháng.
- [x] Tuỳ chỉnh khung giờ hoạt động, số lượng thông báo/chu kỳ, khung giờ ngủ.
- [x] Thuật toán: không lặp liên tiếp, phân bố đều, ưu tiên việc "Quan trọng".
- [x] Material Design 3, Dark Mode, animation (Dismissible, AnimatedSwitcher, page transition).
- [x] Trang chính: danh sách + thống kê (tổng số, đã hoàn thành, số thông báo đang chờ hôm nay).
- [x] Trang cài đặt đầy đủ + Sao lưu/Khôi phục dữ liệu ra file JSON.
- [x] Notification có 2 nút hành động: Hoàn thành / Nhắc lại sau 30 phút.
- [x] Lưu trữ offline bằng Hive, không cần mạng.
- [x] Tái lập lịch qua WorkManager, sống sót qua khởi động lại máy (`RECEIVE_BOOT_COMPLETED`).

## 9. Gợi ý mở rộng tiếp theo

- Thêm widget màn hình khoá (Android App Widget) hiển thị việc ngẫu nhiên hôm nay.
- Đồng bộ nhiều thiết bị qua Firebase Firestore (đã chừa sẵn kiến trúc service để thêm
  `FirebaseSyncService` mà không phải sửa UI).
- Thống kê biểu đồ theo tuần/tháng bằng `fl_chart`.
- Cho phép người dùng tự đặt câu nhắc tuỳ ý thay vì phải trùng tiêu đề công việc.
