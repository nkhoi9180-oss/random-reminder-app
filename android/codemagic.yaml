## 5. Build file APK để cài đặt

```bash
# APK universal (dễ cài, dung lượng lớn hơn 1 chút)
flutter build apk --release

# hoặc chia theo kiến trúc CPU (khuyến nghị, file nhỏ hơn)
flutter build apk --release --split-per-abi
```

File kết quả nằm tại:
```
build/app/outputs/flutter-apk/app-release.apk
```
(hoặc `app-armeabi-v7a-release.apk`, `app-arm64-v8a-release.apk` nếu build split-per-abi).

### Cài lên điện thoại
1. Copy file `.apk` vào điện thoại Android (qua cáp USB, Zalo, Drive...).
2. Mở file đó trên điện thoại → bật "Cài đặt ứng dụng không rõ nguồn gốc" nếu được hỏi.
3. Nhấn **Cài đặt**.

Hoặc cài trực tiếp qua cáp USB khi điện thoại đã bật **Gỡ lỗi USB (Developer Options → USB
debugging)**:
```bash
flutter install
```

### Build App Bundle để đăng lên Google Play (tuỳ chọn)
```bash
flutter build appbundle --release
```
Trước khi phát hành thật, nhớ tạo **keystore riêng** và cấu hình `signingConfigs` trong
`android/app/build.gradle` thay cho `signingConfig signingConfigs.debug` (bản mẫu đang ký tạm
bằng debug keystore để bạn build thử ngay được).

---

## 6. Cấp quyền quan trọng sau khi cài (một lần)

Mở app lần đầu, hệ thống sẽ hỏi quyền **Thông báo** và **Đặt lịch chính xác** — hãy đồng ý cả 2
để thông báo ngẫu nhiên hoạt động chính xác giờ.

Nếu muốn ứng dụng **tôn trọng chế độ Không làm phiền (DND)** một cách chắc chắn, vào:
`Cài đặt điện thoại → Ứng dụng → Nhắc việc ngẫu nhiên → Quyền → Không làm phiền` (hoặc
`Cài đặt → Âm thanh → Không làm phiền → Quyền truy cập ứng dụng đặc biệt`) và cấp quyền
**Notification policy access** cho ứng dụng.

Một số hãng máy (Xiaomi/MIUI, Oppo/ColorOS, Huawei...) có cơ chế diệt ứng dụng nền riêng —
hãy thêm ứng dụng vào danh sách **"Tự khởi chạy" / "Không tối ưu hoá pin"** để WorkManager có
thể chạy tái lập lịch hằng ngày ổn định.

---

## 7. Mở rộng sang iOS (định hướng sẵn trong code)

- Toàn bộ logic (`models/`, `services/`, `screens/`) đều thuần Dart/Flutter, dùng chung được
  cho iOS mà không cần sửa.
- `flutter_local_notifications` và `workmanager` đều hỗ trợ iOS; chỉ cần chạy thêm:
  ```bash
  flutter create --platforms=ios .
  ```
  rồi cấu hình `ios/Runner/Info.plist` (thêm `NSUserNotificationsUsageDescription`,
  bật chế độ Background Modes → "Background fetch" và "Background processing" trong Xcode) và
  build bằng Xcode trên máy Mac (bắt buộc phải có Mac để build/ký app iOS).
- Lưu ý: iOS giới hạn tối đa 64 thông báo local đã lên lịch cùng lúc — nếu chọn `notificationCount`
  lớn kèm `randomMode = monthly`, cần điều chỉnh `SchedulerService` để chia nhỏ theo tuần khi
  chạy trên iOS.

