# Nhắc việc ngẫu nhiên (Random Reminder App)

Ứng dụng Flutter giúp bạn tạo danh sách công việc và nhận **thông báo vào thời điểm ngẫu nhiên**
(thay vì giờ cố định) để thúc đẩy bản thân thực hiện chúng — ví dụ "Đứng dậy vận động 5 phút",
"Đọc 10 trang sách", "Học từ vựng"...

Hoạt động **hoàn toàn offline**, dữ liệu lưu trên máy bằng Hive, lịch thông báo được tái tạo
mỗi ngày bằng WorkManager kể cả khi ứng dụng đã đóng, và vẫn hoạt động sau khi khởi động lại máy.

---

## 1. Cấu trúc project

```
random_reminder_app/
├── lib/
│   ├── main.dart                     # điểm khởi động, gắn kết mọi service
│   ├── models/
│   │   ├── task.dart / task.g.dart               # model Công việc (Hive)
│   │   └── app_settings.dart / app_settings.g.dart # model Cài đặt (Hive)
│   ├── services/
│   │   ├── database_service.dart     # CRUD Hive, sao lưu/khôi phục JSON
│   │   ├── notification_service.dart # tạo kênh, xin quyền, lên lịch, xử lý action
│   │   ├── scheduler_service.dart    # thuật toán chọn việc + sinh giờ ngẫu nhiên
│   │   ├── background_service.dart   # WorkManager tái lập lịch mỗi 24h
│   │   └── theme_notifier.dart       # đổi Sáng/Tối ngay lập tức
│   ├── theme/app_theme.dart          # Material 3, light/dark, màu sắc nhẹ nhàng
│   ├── screens/
│   │   ├── home_screen.dart          # danh sách việc + thống kê
│   │   ├── add_edit_task_screen.dart # thêm/sửa công việc
│   │   └── settings_screen.dart      # toàn bộ tuỳ chỉnh
│   └── widgets/
│       ├── task_card.dart            # thẻ công việc (progress, priority, category)
│       └── stats_row.dart            # 3 ô thống kê ở trang chính
├── android/                          # cấu hình Android đã tuỳ chỉnh sẵn (manifest, gradle)
└── pubspec.yaml
```

Kiến trúc tách rời rõ ràng: **model → service → UI**, không dùng framework nặng, dễ đọc và
dễ mở rộng thêm tính năng (ví dụ thêm đồng bộ Firebase sau này chỉ cần thêm 1 service mới).

---

## 2. Cách hoạt động của thuật toán random (đáp ứng đúng yêu cầu)

`SchedulerService` (`lib/services/scheduler_service.dart`) làm 2 việc:

1. **Sinh thời điểm ngẫu nhiên**: chọn ngẫu nhiên số lượng mốc giờ (`notificationCount`) rải
   trong chu kỳ đã chọn (ngày/tuần/tháng), chỉ trong khung `activeStartHour → activeEndHour`,
   loại trừ khung giờ ngủ, và đảm bảo 2 thông báo không quá gần nhau (<20 phút).
2. **Chọn công việc có trọng số**: việc "Quan trọng" và ưu tiên "Cao" có trọng số cao hơn;
   việc đã được chọn nhiều lần gần đây sẽ giảm trọng số để **phân bố đều**; và **không bao giờ
   lặp lại cùng 1 việc ở 2 lần thông báo liên tiếp** (khi có ≥ 2 việc).

Lịch được tái tạo lại: (a) mỗi khi bạn thêm/sửa/xoá công việc hoặc đổi cài đặt, và
(b) tự động mỗi 24h qua `WorkManager` — kể cả khi app đã bị đóng hoàn toàn hoặc máy vừa khởi
động lại (nhờ quyền `RECEIVE_BOOT_COMPLETED` đã khai báo sẵn trong `AndroidManifest.xml`).

---

## 3. Yêu cầu môi trường trước khi build

- Flutter SDK ≥ 3.22 (kênh stable): https://docs.flutter.dev/get-started/install
- Android Studio (kèm Android SDK, cmdline-tools) hoặc chỉ cần Android SDK + `sdkmanager`
- JDK 17
- Một máy Android thật hoặc emulator để test thông báo (emulator vẫn nhận local notification
  bình thường, nhưng nên test bằng máy thật để kiểm tra hành vi sau khi khởi động lại máy)

Kiểm tra môi trường:
```bash
flutter doctor
```
Khắc phục hết các dấu ✗ liên quan tới Android trước khi build.

---

## 4. Cách lấy code chạy được (khuyến nghị — nhanh và chắc chắn)

Vì Gradle wrapper và icon launcher là các file nhị phân do chính `flutter create` sinh ra theo
đúng phiên bản Flutter/Gradle máy bạn đang cài, cách **an toàn nhất** là để Flutter tự sinh khung
project native, sau đó chép mã Dart của chúng ta vào:

```bash
# 1) Tạo khung project Flutter chuẩn (sinh android/, ios/, gradle wrapper, icon...)
flutter create random_reminder_app
cd random_reminder_app

# 2) Xoá lib/ và pubspec.yaml mặc định, thay bằng bản của chúng ta
rm -rf lib pubspec.yaml
cp -r /đường-dẫn-tới/random_reminder_app/lib .
cp /đường-dẫn-tới/random_reminder_app/pubspec.yaml .

# 3) Áp dụng các thay đổi Android đã chuẩn bị sẵn (quyền, receiver...)
#    Mở 2 file dưới đây và copy đè nội dung tương ứng:
#    - android/app/src/main/AndroidManifest.xml
#    - android/app/build.gradle   (chỉ cần thêm phần compileOptions/coreLibraryDesugaring
#      và dependency desugar_jdk_libs như trong bản mẫu, phần còn lại giữ nguyên bản
#      Flutter vừa sinh ra để không mất gradle wrapper)
cp /đường-dẫn-tới/random_reminder_app/android/app/src/main/AndroidManifest.xml \
   android/app/src/main/AndroidManifest.xml

# 4) Cài dependency
flutter pub get

# 5) (Tuỳ chọn nhưng khuyến nghị) sinh lại các file .g.dart bằng build_runner
#    Bản mẫu đã có sẵn task.g.dart / app_settings.g.dart viết tay nên bước này
#    không bắt buộc, nhưng nếu bạn sửa model Task/AppSettings thì cần chạy:
flutter pub run build_runner build --delete-conflicting-outputs

# 6) Chạy thử trên máy/emulator đang kết nối
flutter run
```

> Lưu ý: nhớ sửa `minSdkVersion` trong `android/app/build.gradle` (bản Flutter vừa tạo) thành
> **23** trở lên, và thêm đoạn `compileOptions { coreLibraryDesugaringEnabled true ... }` +
> dependency `coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.0.4'` như trong file
> `android/app/build.gradle` mẫu — bắt buộc để `flutter_local_notifications` hoạt động đúng.

### Cách 2 (nâng cao): dùng luôn thư mục `android/` đã có sẵn trong gói này

Nếu bạn muốn dùng nguyên bộ `android/` mình đã chuẩn bị (đã có manifest + build.gradle +
MainActivity.kt), chỉ cần bổ sung phần còn thiếu mà Flutter luôn tự sinh (gradle wrapper, icon):

```bash
cd random_reminder_app     # thư mục gốc chứa lib/, pubspec.yaml, android/ đã cho sẵn
flutter create --platforms=android .   # bổ sung gradle wrapper + icon còn thiếu, KHÔNG ghi đè code có sẵn
flutter pub get
flutter run
```

